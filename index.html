<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<title>ORIGAMI Dashboard</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d0d;
    --bg-2:      #161616;
    --bg-3:      #1e1e1e;
    --border:    #2a2a2a;
    --border-2:  #3a3a3a;
    --red:       #e53238;
    --red-dim:   #7a1a1d;
    --red-glow:  rgba(229,50,56,0.15);
    --white:     #f0f0f0;
    --muted:     #666666;
    --muted-2:   #444444;
    --green:     #39a84a;
    --green-dim: rgba(57,168,74,0.12);
    --orange:    #f07030;
    --font:      'Noto Sans JP', sans-serif;
    --mono:      'Roboto Mono', monospace;
    --display:   'Bebas Neue', sans-serif;
    --radius:    3px;
    --radius-lg: 6px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--white);
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 2px;
    line-height: 1;
  }

  .logo-main {
    font-family: var(--display);
    font-size: 28px;
    color: var(--white);
    letter-spacing: 3px;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--red);
    letter-spacing: 2px;
    margin-left: 6px;
    border-left: 1px solid var(--red-dim);
    padding-left: 8px;
    line-height: 1.6;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .last-updated {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .refresh-btn {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red-dim);
    padding: 5px 14px;
    border-radius: var(--radius);
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.15s, border-color 0.15s;
  }
  .refresh-btn:hover {
    background: var(--red-glow);
    border-color: var(--red);
  }

  /* ── Main ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

  /* ── Period tabs ── */
  .period-bar {
    display: flex;
    gap: 0;
    margin-bottom: 18px;
    width: fit-content;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .period-tab {
    padding: 7px 18px;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 1px;
    color: var(--muted);
    cursor: pointer;
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    transition: background 0.1s, color 0.1s;
  }
  .period-tab:last-child { border-right: none; }
  .period-tab:hover { background: var(--bg-3); color: var(--white); }
  .period-tab.active {
    background: var(--red);
    color: var(--white);
  }

  /* ── Metric cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-top: 2px solid var(--border-2);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    position: relative;
  }

  .card.accent { border-top-color: var(--red); }
  .card.accent-g { border-top-color: var(--green); }
  .card.accent-o { border-top-color: var(--orange); }
  .card.accent-w { border-top-color: #555; }

  .card-source {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .card-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 400;
    color: var(--white);
    letter-spacing: -1px;
    margin-bottom: 8px;
    line-height: 1;
  }

  .card-diff {
    font-size: 11px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-diff.up   { color: var(--green); }
  .card-diff.down { color: var(--red); }
  .card-diff.neutral { color: var(--muted); }

  /* ── Charts row ── */
  .charts-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .panel {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .panel-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--white);
    text-transform: uppercase;
  }

  .panel-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .panel-body { padding: 16px 18px; }

  /* ── Bar chart ── */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 7px;
    height: 110px;
  }

  .bar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    gap: 5px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar-fill {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 2px 2px 0 0;
    min-height: 3px;
    transition: height 0.4s ease;
  }

  .bar-fill.today {
    background: var(--red);
    border-color: var(--red);
  }

  .bar-day {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
  }
  .bar-day.today { color: var(--red); }

  /* ── Source list ── */
  .source-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .source-item:last-child { border-bottom: none; }

  .source-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .source-name {
    font-size: 12px;
    color: var(--white);
    width: 80px;
    flex-shrink: 0;
  }

  .source-track {
    flex: 1;
    height: 4px;
    background: var(--bg-3);
    border-radius: 2px;
    overflow: hidden;
  }

  .source-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .source-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 42px;
    text-align: right;
  }

  /* ── Bottom row ── */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }

  thead th {
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0 0 8px;
    border-bottom: 1px solid var(--border);
  }
  thead th:last-child { text-align: right; }

  tbody td {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    color: var(--white);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody td:last-child { text-align: right; }
  tbody tr:hover td { background: var(--bg-3); }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 2px;
    border: 1px solid transparent;
  }
  .badge-ok  { border-color: #1e4d24; color: var(--green); background: var(--green-dim); }
  .badge-low { border-color: #5a3010; color: var(--orange); background: rgba(240,112,48,0.1); }
  .badge-out { border-color: var(--red-dim); color: var(--red); background: var(--red-glow); }
  .badge-shipped    { border-color: #1a3050; color: #5090d0; background: rgba(80,144,208,0.1); }
  .badge-processing { border-color: #5a3010; color: var(--orange); background: rgba(240,112,48,0.1); }

  .order-id {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
  }

  .amount {
    font-family: var(--mono);
  }

  /* ── Divider line ── */
  .section-rule {
    height: 1px;
    background: linear-gradient(to right, var(--red), transparent);
    margin-bottom: 16px;
  }

  /* ── Footer ── */
  .footnote {
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted-2);
    margin-top: 20px;
    padding-bottom: 32px;
    letter-spacing: 0.5px;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .main { padding: 12px 14px; }
    .cards { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .bottom-row { grid-template-columns: 1fr; }
    .header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="logo-main">ORIGAMI</span>
    <span class="logo-sub">DASHBOARD</span>
  </div>
  <div class="header-right">
    <span class="last-updated" id="last-updated">--</span>
    <button class="refresh-btn" onclick="refresh()">↻ REFRESH</button>
  </div>
</header>

<main class="main">

  <div class="period-bar">
    <button class="period-tab active" onclick="setPeriod(this,'day')">TODAY</button>
    <button class="period-tab" onclick="setPeriod(this,'week')">WEEK</button>
    <button class="period-tab" onclick="setPeriod(this,'month')">MONTH</button>
    <button class="period-tab" onclick="setPeriod(this,'year')">YEAR</button>
  </div>

  <div class="section-rule"></div>

  <div class="cards">
    <div class="card accent">
      <div class="card-source">Wix</div>
      <div class="card-label">売上</div>
      <div class="card-value" id="wix-sales">¥285</div>
      <div class="card-diff down" id="wix-diff">▼ −12%</div>
    </div>
    <div class="card accent-g">
      <div class="card-source">Square</div>
      <div class="card-label">売上（実店舗）</div>
      <div class="card-value" id="sq-sales">¥12,400</div>
      <div class="card-diff neutral" id="sq-diff">— 実店舗</div>
    </div>
    <div class="card accent-o">
      <div class="card-source">Wix + Square</div>
      <div class="card-label">注文数</div>
      <div class="card-value" id="orders">3</div>
      <div class="card-diff up" id="orders-diff">▲ +8%</div>
    </div>
    <div class="card accent-w">
      <div class="card-source">Wix</div>
      <div class="card-label">総在庫数</div>
      <div class="card-value" id="stock">142</div>
      <div class="card-diff neutral">SKU: 12</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">売上推移 — 直近7日</span>
        <span class="panel-sub" id="chart-range">--</span>
      </div>
      <div class="panel-body">
        <div class="bar-chart" id="bar-chart"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">アクセス元</span>
        <span class="panel-sub">過去30日</span>
      </div>
      <div class="panel-body" id="source-list"></div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">在庫一覧</span>
        <span class="panel-sub">Wix在庫</span>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>商品名</th><th>在庫</th><th>状態</th></tr></thead>
          <tbody id="stock-table"></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">直近の注文</span>
        <span class="panel-sub">最新4件</span>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>注文ID</th><th>金額</th><th>状態</th></tr></thead>
          <tbody id="order-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <p class="footnote" id="footnote">※ SAMPLE DATA — CONNECT API TO ENABLE LIVE DATA</p>

</main>

<script>
const periods = {
  day:   { wix:'¥285',     sq:'¥12,400',    orders:3,   wixUp:false, wixD:'−12%', ordUp:true,  ordD:'+8%',  bars:[18,32,12,44,28,35,9],    range:'6/1 〜 6/8' },
  week:  { wix:'¥2,633',   sq:'¥87,000',    orders:21,  wixUp:true,  wixD:'+5%',  ordUp:true,  ordD:'+5%',  bars:[120,85,200,160,190,210,95], range:'5/26 〜 6/8' },
  month: { wix:'¥37,575',  sq:'¥340,000',   orders:89,  wixUp:false, wixD:'−55%', ordUp:false, ordD:'−10%', bars:[280,310,190,420,380,260,340], range:'5/9 〜 6/8' },
  year:  { wix:'¥212,156', sq:'¥2,100,000', orders:412, wixUp:true,  wixD:'+22%', ordUp:true,  ordD:'+18%', bars:[180,220,300,410,380,290,350], range:'2025/6 〜 2026/6' }
};

const days = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

const sources = [
  { name:'Twitter/X', val:2967, color:'#e0e0e0' },
  { name:'Instagram', val:633,  color:'#e53238' },
  { name:'Google',    val:471,  color:'#aaaaaa' },
  { name:'TikTok',    val:251,  color:'#888888' },
  { name:'Facebook',  val:191,  color:'#666666' },
];

const stocks = [
  { name:'ステアリング A1', qty:24 },
  { name:'ステアリング B2', qty:8 },
  { name:'タワーバー FR',   qty:3 },
  { name:'タワーバー RR',   qty:15 },
  { name:'ハブリング 4pc',  qty:0 },
];

const orders = [
  { id:'#4821', amt:'¥18,500', status:'発送済', shipped:true },
  { id:'#4820', amt:'¥12,000', status:'処理中', shipped:false },
  { id:'#4819', amt:'¥9,800',  status:'発送済', shipped:true },
  { id:'#4818', amt:'¥24,000', status:'発送済', shipped:true },
];

function setPeriod(btn, key) {
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const d = periods[key];
  document.getElementById('wix-sales').textContent = d.wix;
  document.getElementById('sq-sales').textContent = d.sq;
  document.getElementById('orders').textContent = d.orders;
  document.getElementById('chart-range').textContent = d.range;
  const wd = document.getElementById('wix-diff');
  wd.textContent = (d.wixUp ? '▲ ' : '▼ ') + d.wixD;
  wd.className = 'card-diff ' + (d.wixUp ? 'up' : 'down');
  const od = document.getElementById('orders-diff');
  od.textContent = (d.ordUp ? '▲ ' : '▼ ') + d.ordD;
  od.className = 'card-diff ' + (d.ordUp ? 'up' : 'down');
  renderBars(d.bars);
}

function renderBars(bars) {
  const max = Math.max(...bars);
  document.getElementById('bar-chart').innerHTML = bars.map((v, i) => `
    <div class="bar-col">
      <div class="bar-fill${i===6?' today':''}" style="height:${Math.round(v/max*100)}px"></div>
      <span class="bar-day${i===6?' today':''}">${days[i]}</span>
    </div>`).join('');
}

function renderSources() {
  const max = sources[0].val;
  document.getElementById('source-list').innerHTML = sources.map(s => `
    <div class="source-item">
      <div class="source-dot" style="background:${s.color}"></div>
      <span class="source-name">${s.name}</span>
      <div class="source-track"><div class="source-fill" style="width:${Math.round(s.val/max*100)}%;background:${s.color}"></div></div>
      <span class="source-num">${s.val.toLocaleString()}</span>
    </div>`).join('');
}

function renderStock() {
  document.getElementById('stock-table').innerHTML = stocks.map(s => {
    const cls = s.qty === 0 ? 'badge-out' : s.qty <= 5 ? 'badge-low' : 'badge-ok';
    const label = s.qty === 0 ? 'OUT' : s.qty <= 5 ? 'LOW' : 'OK';
    return `<tr><td>${s.name}</td><td style="font-family:var(--mono)">${s.qty}</td><td><span class="badge ${cls}">${label}</span></td></tr>`;
  }).join('');
}

function renderOrders() {
  document.getElementById('order-table').innerHTML = orders.map(o => `
    <tr>
      <td><span class="order-id">${o.id}</span></td>
      <td><span class="amount">${o.amt}</span></td>
      <td><span class="badge ${o.shipped?'badge-shipped':'badge-processing'}">${o.status}</span></td>
    </tr>`).join('');
}

function refresh() {
  document.getElementById('last-updated').textContent = new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

renderBars(periods.day.bars);
renderSources();
renderStock();
renderOrders();
document.getElementById('chart-range').textContent = periods.day.range;
refresh();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
